name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Lint
        run: uv run ruff check .
        working-directory: backend

      - name: Test
        env:
          # Deterministic non-production backend auth settings for tests only.
          APP_ENV: test
          PUBLIC_BASE_URL: http://localhost:13000
          OIDC_ISSUER: http://localhost:19000/application/o/arena-e2e/
          OIDC_CLIENT_ID: arena-e2e-client
          OIDC_CLIENT_SECRET: arena-ci-confidential-client-secret
          OIDC_CLIENT_AUTH_METHOD: client_secret_basic
          OIDC_SCOPE: openid email profile
          OIDC_REDIRECT_PATH: /api/v1/auth/callback
          AUTH_SESSION_HASH_SECRET: arena-ci-auth-session-hash-secret
          AUTH_SESSION_COOKIE_NAME: arena_session
          AUTH_SESSION_MAX_AGE_SECONDS: "28800"
          AUTH_CSRF_HEADER_NAME: X-CSRF-Token
        run: uv run pytest
        working-directory: backend
