server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Return 404 for backend/doc paths that should never hit the SPA
    location /api/ {
        return 404;
    }
    location = /docs {
        return 404;
    }
    location = /redoc {
        return 404;
    }
    location = /openapi.json {
        return 404;
    }

    # Serve static assets directly; fall back to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
