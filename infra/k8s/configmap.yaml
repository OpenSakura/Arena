# infra/k8s/configmap.yaml
#
# Non-secret environment settings for the OpenSakura Arena platform.
# Store secret values in Kubernetes Secrets and wire them into the backend
# Deployment with secretKeyRef. Do not put literal secret values in this
# ConfigMap.

apiVersion: v1
kind: ConfigMap
metadata:
  name: arena-config
  labels:
    app.kubernetes.io/name: opensakura-arena
    app.kubernetes.io/part-of: opensakura
data:
  # Backend core
  APP_ENV: "production"
  APP_NAME: "OpenSakura Arena API"
  API_V1_PREFIX: "/api/v1"
  PUBLIC_BASE_URL: "https://arena.example.com"
  WEB_CONCURRENCY: "1"

  # Logging and observability
  LOG_LEVEL: ""
  LOG_JSON: "true"
  ACCESS_LOG_ENABLED: "false"
  # OTLP tracing placeholders. Leave endpoints empty to keep tracing disabled.
  OTLP_DISABLED: "false"
  OTLP_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  # OTLP_AUTH_HEADER should come from a Secret when needed.
  OTLP_AUTH_HEADER: ""
  OTLP_PROJECT_NAME: ""
  OTEL_SERVICE_NAME: "opensakura-arena-backend"
  OTEL_RESOURCE_ATTRIBUTES: ""
  OTLP_EXPORTER_TIMEOUT_SECONDS: "30.0"
  OTLP_BATCH_EXPORT_TIMEOUT_MILLIS: "10000"
  OPENINFERENCE_HIDE_INPUTS: "true"
  OPENINFERENCE_HIDE_OUTPUTS: "true"
  OPENINFERENCE_HIDE_INPUT_MESSAGES: "true"
  OPENINFERENCE_HIDE_OUTPUT_MESSAGES: "true"
  OPENINFERENCE_HIDE_INPUT_TEXT: "true"
  OPENINFERENCE_HIDE_OUTPUT_TEXT: "true"
  OPENINFERENCE_HIDE_LLM_INVOCATION_PARAMETERS: "true"
  OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT: "false"

  # Database connection should come from a Secret in production.
  DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/arena"
  DATABASE_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS: "30000"

  # CORS
  CORS_ALLOW_ORIGINS: "https://arena.example.com"

  # Backend confidential OIDC. The callback URI is
  # https://arena.example.com/api/v1/auth/callback.
  OIDC_ISSUER: "https://auth.example.com/application/o/arena/"
  OIDC_CLIENT_ID: "arena-backend"
  OIDC_CLIENT_AUTH_METHOD: "client_secret_basic"
  OIDC_SCOPE: "openid email profile"
  OIDC_REDIRECT_PATH: "/api/v1/auth/callback"
  OIDC_ADMIN_GROUP_CLAIM: "groups"
  OIDC_ADMIN_GROUP_NAME: "arena_admin"
  OIDC_JWKS_CACHE_TTL_SECONDS: "300"
  OIDC_HTTP_TIMEOUT_SECONDS: "5"

  # Backend-owned app session and CSRF settings. AUTH_SESSION_HASH_SECRET must
  # come from a Secret because it HMAC-hashes opaque session, CSRF, and login
  # state tokens server-side.
  AUTH_SESSION_COOKIE_NAME: "arena_session"
  AUTH_LOGIN_STATE_COOKIE_NAME: "arena_oauth_state"
  AUTH_SESSION_MAX_AGE_SECONDS: "28800"
  AUTH_SESSION_LAST_SEEN_MIN_INTERVAL_SECONDS: "60"
  AUTH_SESSION_LAST_SEEN_LOCK_TIMEOUT_MS: "100"
  AUTH_SESSION_LAST_SEEN_STATEMENT_TIMEOUT_MS: "500"
  AUTH_CSRF_HEADER_NAME: "X-CSRF-Token"

  # Cloudflare Turnstile, retained as a deprecated placeholder.
  # TURNSTILE_SECRET_KEY should come from a Secret in production.
  TURNSTILE_SECRET_KEY: ""
  TURNSTILE_VERIFY_URL: "https://challenges.cloudflare.com/turnstile/v0/siteverify"

  # Authenticated rate limits
  AUTH_BATTLE_CREATE_RATE_LIMIT: "60"
  AUTH_BATTLE_CREATE_RATE_LIMIT_WINDOW_SECONDS: "60"
  AUTH_BATTLE_STREAM_RATE_LIMIT: "90"
  AUTH_BATTLE_STREAM_RATE_LIMIT_WINDOW_SECONDS: "60"
  AUTH_VOTE_SUBMIT_RATE_LIMIT: "90"
  AUTH_VOTE_SUBMIT_RATE_LIMIT_WINDOW_SECONDS: "60"

  # Redis. Leave RATE_LIMIT_REDIS_URL empty unless explicitly enabling Redis-backed
  # rate limiting and shared confidence caching for the deployment.
  RATE_LIMIT_REDIS_URL: ""
  RATE_LIMIT_REDIS_KEY_PREFIX: "arena"
  RATE_LIMIT_REDIS_TIMEOUT_SECONDS: "0.25"

  # Reverse proxy
  TRUST_X_FORWARDED_FOR: "true"

  # Encryption keys should come from Secrets in production.
  ARENA_MASTER_KEY: ""
  ARENA_MASTER_KEY_OLD: ""

  # LLM client and in-process queue controls.
  OPENAI_CONNECT_TIMEOUT_SECONDS: "10.0"
  OPENAI_MODEL_TIMEOUT_SECONDS: "120.0"
  MAX_CONCURRENT_LLM_REQUESTS: "40"
  MAX_LLM_REQUESTS: "120"
  LLM_QUEUE_WAIT_TIMEOUT_SECONDS: "30.0"
  LLM_QUEUE_SHUTDOWN_TIMEOUT_SECONDS: "10.0"
  ADMIN_MODEL_TEST_TIMEOUT_SECONDS: "20.0"

  # Battle sampling
  BATTLE_SAMPLING_WEIGHTS: "{}"
  BATTLE_TARGETS: "{}"
  BATTLE_STRICT_TARGETS: "{}"
  BATTLE_OUTAGE_MODELS: "[]"
  BATTLE_SAMPLING_BOOST_MODELS: "[]"
  BATTLE_RUNNING_WAIT_TIMEOUT_SECONDS: "600"

  # Leaderboard refresh
  LEADERBOARD_REFRESH_ENABLED: "true"
  LEADERBOARD_REFRESH_INTERVAL_SECONDS: "300"
  LEADERBOARD_REFRESH_DAILY_VOTE_CAP: "0"
  LEADERBOARD_REFRESH_ELO_K: "32"

  # Leaderboard confidence, throttled
  LEADERBOARD_CONFIDENCE_CACHE_TTL_SECONDS: "15"
  LEADERBOARD_CONFIDENCE_RATE_LIMIT: "6"
  LEADERBOARD_CONFIDENCE_RATE_LIMIT_WINDOW_SECONDS: "60"

  # Elo bootstrap and confidence
  LEADERBOARD_ELO_BOOTSTRAP_ROUNDS: "200"
  LEADERBOARD_ELO_BOOTSTRAP_SEED: "0"
  LEADERBOARD_ELO_CONFIDENCE_LEVEL: "0.95"
  LEADERBOARD_ELO_SHUFFLE_ROUNDS: "5"
  LEADERBOARD_ELO_SHUFFLE_SEED: "0"

  # Bradley-Terry leaderboard
  LEADERBOARD_BT_MAX_ITERATIONS: "200"
  LEADERBOARD_BT_TOLERANCE: "1e-6"
  LEADERBOARD_BT_BOOTSTRAP_ROUNDS: "200"
  LEADERBOARD_BT_BOOTSTRAP_SEED: "0"
  LEADERBOARD_BT_PRIOR: "1e-6"
  LEADERBOARD_BT_CONFIDENCE_LEVEL: "0.95"

---
apiVersion: v1
kind: Secret
metadata:
  name: arena-auth-secrets
  labels:
    app.kubernetes.io/name: opensakura-arena
    app.kubernetes.io/part-of: opensakura
type: Opaque
# Populate this Secret out of band with backend secret values. Keep real values
# in your secret manager, sealed secret, or cluster secret store.

# Backend Deployment env wiring example:
# - name: OIDC_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: arena-auth-secrets
#       key: OIDC_CLIENT_SECRET
# - name: AUTH_SESSION_HASH_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: arena-auth-secrets
#       key: AUTH_SESSION_HASH_SECRET
# - name: TURNSTILE_SECRET_KEY
#   valueFrom:
#     secretKeyRef:
#       name: arena-auth-secrets
#       key: TURNSTILE_SECRET_KEY
# - name: ARENA_MASTER_KEY
#   valueFrom:
#     secretKeyRef:
#       name: arena-auth-secrets
#       key: ARENA_MASTER_KEY
